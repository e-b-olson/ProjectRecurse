# Local Supabase stack for development and integration tests.
# Start/stop via developer/scripts/supabase-*.sh or the Supabase CLI in ProjectRecurse/.
# Docs: https://supabase.com/docs/guides/cli/config

project_id = "projectrecurse"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = [
  "http://127.0.0.1:3000/auth/callback",
  "http://localhost:3000/auth/callback",
]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
# Local dev: skip email confirmation (OTP still works; check Inbucket at :54324)
enable_confirmations = false

[edge_runtime]
enabled = true

[analytics]
enabled = true
